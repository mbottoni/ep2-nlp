name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # The torch-free modules (vowels, data, baselines, metrics) are covered by
      # the test suite, so CI installs only their lightweight dependencies.
      - name: Install dependencies
        run: pip install numpy pandas scikit-learn pytest ruff
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q
